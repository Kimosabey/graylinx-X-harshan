<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Harshan × Graylinx — Work Tracker</title>
<meta name="description" content="Work tracker & showcase — projects, timeline and engagement at Graylinx." />
<style>
/* ===================================================================== *
 *  ACCESSIBLE MONOCHROME NEUMORPHISM
 *  One gray base; depth from dual soft shadows. Text & focus kept WCAG-AA+.
 *  Status/work-type encoded by grayscale + glyph + label (never colour alone).
 * ===================================================================== */
:root{
  --bg:#ECECEC; --card:#ECECEC; --hl:#FFFFFF; --sh:#C6C6C6;
  --ink:#171717; --ink2:#4B4B4B; --ink3:#5C5C5C;
  --line:#D2D2D2;
  --s1:#171717; --s2:#3A3A3A; --s3:#5C5C5C; --s4:#888888; --s5:#ABABAB;
  /* work-type foregrounds (backgrounds reference --s* which flip per theme) */
  --wtOffice-fg:#F2F2F2; --wtDisc-fg:#F2F2F2; --wtWFH-fg:#171717;

  --radius:20px; --radius-sm:13px; --radius-xs:10px; --gap:clamp(12px,2.2vw,18px); --appbar:66px; --labelw:200px;
  --pad:clamp(14px,2.4vw,30px); --pad-panel:clamp(15px,2.2vw,20px); --pad-card:clamp(15px,1.8vw,18px);
  --font:"Inter","Segoe UI",system-ui,-apple-system,"Helvetica Neue",Arial,sans-serif;
  --raise:-4px -4px 8px var(--hl), 4px 4px 9px var(--sh);
  --raise-hi:-6px -6px 13px var(--hl), 7px 7px 16px var(--sh);
  --inset:inset 3px 3px 6px var(--sh), inset -3px -3px 6px var(--hl);
  --inset-sm:inset 2px 2px 4px var(--sh), inset -2px -2px 4px var(--hl);
  --ease:cubic-bezier(.2,.7,.2,1);
}
html[data-theme="dark"]{
  --bg:#1C1C1C; --card:#1C1C1C; --hl:#2A2A2A; --sh:#0D0D0D;
  --ink:#F2F2F2; --ink2:#B2B2B2; --ink3:#8C8C8C; --line:#333333;
  --s1:#F2F2F2; --s2:#CFCFCF; --s3:#A6A6A6; --s4:#7C7C7C; --s5:#5A5A5A;
  --wtOffice-fg:#171717; --wtDisc-fg:#171717; --wtWFH-fg:#F2F2F2;
}
@media (prefers-color-scheme:dark){
  html[data-theme="auto"]{
    --bg:#1C1C1C; --card:#1C1C1C; --hl:#2A2A2A; --sh:#0D0D0D;
    --ink:#F2F2F2; --ink2:#B2B2B2; --ink3:#8C8C8C; --line:#333333;
    --s1:#F2F2F2; --s2:#CFCFCF; --s3:#A6A6A6; --s4:#7C7C7C; --s5:#5A5A5A;
    --wtOffice-fg:#171717; --wtDisc-fg:#171717; --wtWFH-fg:#F2F2F2;
  }
}

*{box-sizing:border-box}
html{scrollbar-width:none;-ms-overflow-style:none}
html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
/* Lenis */
html.lenis,html.lenis body{height:auto}
.lenis.lenis-smooth{scroll-behavior:auto!important}
.lenis.lenis-smooth [data-lenis-prevent]{overscroll-behavior:contain}
.lenis.lenis-stopped{overflow:hidden}

html,body{margin:0;padding:0}
body{font-family:var(--font);font-size:clamp(13.5px,.35vw+12.9px,15px);color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;
  line-height:1.55;min-height:100vh;overflow-x:hidden;transition:background .3s var(--ease),color .3s var(--ease)}
a{color:var(--ink);text-underline-offset:3px}
.ic{display:inline-block;vertical-align:middle;flex:none}
.skip{position:absolute;left:-999px;top:0;background:var(--ink);color:var(--bg);padding:10px 16px;z-index:300;border-radius:0 0 10px 0}
.skip:focus{left:0}
:focus-visible{outline:2px solid var(--ink);outline-offset:3px;border-radius:8px}

/* decorative parallax backdrop */
#orbs{position:fixed;inset:-10% -10% auto -10%;height:120vh;z-index:-1;pointer-events:none;opacity:.6}
#orbs::before,#orbs::after{content:"";position:absolute;border-radius:50%;filter:blur(60px)}
#orbs::before{width:46vw;height:46vw;left:-6vw;top:2vh;background:radial-gradient(circle,var(--hl),transparent 70%)}
#orbs::after{width:40vw;height:40vw;right:-4vw;top:38vh;background:radial-gradient(circle,var(--sh),transparent 70%)}

/* scroll progress */
#progress{position:fixed;top:0;left:0;right:0;height:3px;z-index:200;background:transparent}
#progress > i{display:block;height:100%;width:100%;transform:scaleX(0);transform-origin:0 50%;background:var(--ink);opacity:.85}

/* ----------------------------- app bar ------------------------------ */
.appbar{position:sticky;top:0;z-index:60;background:color-mix(in srgb,var(--bg) 82%,transparent);
  backdrop-filter:saturate(150%) blur(12px);-webkit-backdrop-filter:saturate(150%) blur(12px);
  transition:padding .25s var(--ease),box-shadow .25s var(--ease)}
.appbar.scrolled{box-shadow:0 6px 18px -12px var(--sh)}
.appwrap{display:flex;align-items:center;gap:16px;max-width:1340px;margin:0 auto;padding:13px clamp(14px,3vw,30px);transition:padding .25s var(--ease)}
.appbar.scrolled .appwrap{padding-top:9px;padding-bottom:9px}
.brand{display:flex;align-items:center;gap:13px;min-width:0;will-change:transform}
.logo-plate{display:grid;place-items:center;background:#FFFFFF;border-radius:13px;padding:6px 13px;box-shadow:var(--raise)}
.logo-plate img{height:34px;width:auto;display:block}
.brand-x{font-weight:200;font-size:20px;color:var(--ink3)}
.avatar{height:44px;width:44px;border-radius:50%;object-fit:cover;filter:grayscale(1);padding:3px;background:var(--card);
  box-shadow:var(--raise);transition:filter .3s var(--ease)}
.avatar:hover{filter:grayscale(0)}
.titles h1{font-size:clamp(15px,2.2vw,18px);margin:0;font-weight:680;letter-spacing:-.2px;line-height:1.15}
.titles .sub{font-size:11.5px;color:var(--ink2);margin-top:1px}
.appbar.scrolled .titles .sub{display:none}
.top-actions{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}

/* ----------------------------- buttons ------------------------------ */
.btn{font:inherit;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;background:var(--card);
  border:0;border-radius:12px;padding:9px 14px;min-height:40px;display:inline-flex;align-items:center;gap:8px;
  box-shadow:var(--raise);transition:box-shadow .18s var(--ease),transform .12s var(--ease),color .2s var(--ease)}
.btn:hover{box-shadow:var(--raise-hi)}
.btn:active{box-shadow:var(--inset);transform:translateY(1px)}
.btn.primary{color:var(--ink)}
.btn.sm{padding:8px 12px;min-height:36px;font-size:12.5px}
.btn .ic{width:17px;height:17px}

/* ----------------------------- layout ------------------------------- */
main{max-width:1340px;margin:0 auto;padding:var(--pad)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--gap);margin-bottom:24px}
.stat{background:var(--card);border-radius:var(--radius);padding:clamp(14px,2vw,18px);box-shadow:var(--raise);
  transition:box-shadow .2s var(--ease),transform .2s var(--ease)}
.stat:hover{box-shadow:var(--raise-hi);transform:translateY(-2px)}
.stat .num{font-size:clamp(23px,4.4vw,30px);font-weight:740;letter-spacing:-1px;line-height:1;font-variant-numeric:tabular-nums}
.stat .lbl{font-size:11px;color:var(--ink2);margin-top:8px;text-transform:uppercase;letter-spacing:.7px}
.stat .meta{font-size:11.5px;color:var(--ink3);margin-top:3px}

/* ----------------------------- tabs --------------------------------- */
.tabs{position:sticky;top:calc(var(--appbar) - 4px);z-index:40;display:inline-flex;gap:6px;margin-bottom:22px;
  background:var(--card);padding:7px;border-radius:16px;box-shadow:var(--inset);max-width:100%;overflow-x:auto}
.tab{font:inherit;font-weight:640;font-size:13.5px;color:var(--ink2);background:transparent;border:0;cursor:pointer;
  padding:9px 17px;border-radius:11px;min-height:42px;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;
  transition:color .2s var(--ease),box-shadow .28s var(--ease),background .28s var(--ease)}
.tab[aria-selected="true"]{color:var(--ink);background:var(--card);box-shadow:var(--raise)}
.tab .ic{width:16px;height:16px}

/* ----------------------------- toolbar ------------------------------ */
.toolbar{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:20px}
.field{display:flex;flex-direction:column;gap:5px;min-width:0}
.field label{font-size:10.5px;color:var(--ink2);text-transform:uppercase;letter-spacing:.6px;padding-left:4px}
select,input[type=text],input[type=date],input[type=number],textarea{font:inherit;font-size:13.5px;color:var(--ink);
  background:var(--card);border:0;border-radius:12px;padding:10px 13px;min-height:42px;box-shadow:var(--inset);
  transition:box-shadow .2s var(--ease)}
select:focus,input:focus,textarea:focus{outline:2px solid var(--ink);outline-offset:2px}
input[type=text].search{min-width:220px}
textarea{min-height:78px;resize:vertical;line-height:1.5}
.legend{display:flex;gap:16px;flex-wrap:wrap;align-items:center;font-size:12px;color:var(--ink2);margin:0 0 16px}
.legend span{display:inline-flex;align-items:center;gap:7px}
.dot{width:11px;height:11px;border-radius:50%;display:inline-block;flex:none;box-shadow:var(--inset-sm)}
.swatch{width:15px;height:15px;border-radius:5px;display:inline-block;flex:none}

/* ----------------------------- panels ------------------------------- */
.panel{background:var(--card);border-radius:var(--radius);box-shadow:var(--raise);padding:var(--pad-panel);margin-bottom:clamp(16px,2.4vw,24px)}
.panel h2{margin:0 0 18px;font-size:15px;font-weight:680;letter-spacing:-.2px;display:flex;align-items:center;gap:9px}
.panel h2 .ic{width:18px;height:18px;color:var(--ink2)}

/* ------------------------- gantt timeline --------------------------- */
.gantt{font-size:12.5px;overflow-x:auto;padding-bottom:8px}
.gantt-axis{position:relative;height:20px;margin-left:var(--labelw);border-bottom:1px solid var(--line);min-width:460px}
.gantt-axis .mlabel{position:absolute;top:0;font-size:10.5px;color:var(--ink3);transform:translateX(2px);white-space:nowrap}
.gantt-group{margin-top:16px}
.gantt-group .ghead{font-size:10.5px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.9px;margin:8px 0 8px}
.grow{display:grid;grid-template-columns:var(--labelw) 1fr;align-items:center;min-height:32px}
.grow .glabel{font-size:12.5px;color:var(--ink);padding-right:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gtrack{position:relative;height:20px;min-width:300px;border-radius:10px;box-shadow:var(--inset-sm)}
.gtrack .gline{position:absolute;top:-8px;bottom:-8px;width:1px;background:var(--line)}
.gbar{position:absolute;top:3px;height:14px;border-radius:8px;min-width:8px;cursor:pointer;
  box-shadow:-2px -2px 4px color-mix(in srgb,var(--hl) 60%,transparent), 2px 2px 5px var(--sh);
  transition:transform .16s var(--ease),filter .16s var(--ease);transform-origin:left center}
.gbar:hover{transform:scaleY(1.4)}
.gtoday{position:absolute;top:-10px;bottom:-10px;width:0;border-left:2px dashed var(--ink3)}
.gtoday::after{content:"today";position:absolute;top:-14px;left:4px;font-size:9px;color:var(--ink3)}

/* ----------------------------- cards -------------------------------- */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:var(--gap)}
.pcard{background:var(--card);border-radius:var(--radius);box-shadow:var(--raise);padding:var(--pad-card);display:flex;
  flex-direction:column;gap:11px;position:relative;overflow:hidden;
  transition:box-shadow .2s var(--ease),transform .2s var(--ease)}
.pcard:hover{box-shadow:var(--raise-hi);transform:translateY(-3px)}
.pcard .phead{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.pcard h3{margin:0;font-size:clamp(14.5px,1.7vw,15.5px);font-weight:660;line-height:1.25;letter-spacing:-.2px}
.pcard .pcat{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;margin-top:5px}
.pcard .pdesc{font-size:13px;color:var(--ink2)}
.pcard .prole{font-size:12.5px;color:var(--ink)}
.dates{font-size:12px;color:var(--ink2);display:flex;gap:9px;align-items:center;flex-wrap:wrap}
.src{font-size:9px;padding:2px 8px;border-radius:20px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;box-shadow:var(--inset-sm)}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:680;color:var(--ink);
  padding:4px 11px 4px 9px;border-radius:20px;background:var(--card);box-shadow:var(--inset-sm);white-space:nowrap}
.chip .glyph{font-size:10px;color:var(--ink2)}
.tags{display:flex;flex-wrap:wrap;gap:7px}
.tag{font-size:11px;color:var(--ink2);background:var(--card);border-radius:9px;padding:3px 10px;box-shadow:var(--inset-sm)}
.bar{height:9px;border-radius:8px;box-shadow:var(--inset-sm);overflow:hidden}
.bar > i{display:block;height:100%;border-radius:8px;background:var(--barcol,var(--s3));width:0;transition:width .8s var(--ease)}
.hl{font-size:12px;color:var(--ink2);margin:0;padding-left:18px}
.hl li{margin:3px 0}
.commits{font-size:12px;color:var(--ink3);display:inline-flex;align-items:center;gap:4px}
.commits .ic{width:13px;height:13px}
.row-actions{display:flex;gap:7px;margin-top:auto;padding-top:4px}

/* --------------------------- calendar ------------------------------- */
.cal-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(244px,1fr));gap:var(--gap)}
.month{background:var(--card);border-radius:var(--radius-sm);padding:14px;box-shadow:var(--inset)}
.month h4{margin:0 0 10px;font-size:13px;font-weight:640;text-align:center}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.cal .wd{font-size:9.5px;color:var(--ink3);text-align:center;text-transform:uppercase}
.cal .cell{aspect-ratio:1;border-radius:9px;display:grid;place-items:center;font-size:11.5px;color:var(--ink3);
  background:var(--card);transition:transform .14s var(--ease)}
.cal .cell.empty{box-shadow:none;background:transparent}
.cal .cell:not(.empty):not(.has):not(.nf){box-shadow:var(--inset-sm)}
.cal .cell.has{cursor:pointer;font-weight:680;box-shadow:var(--raise)}
.cal .cell.has:hover{transform:scale(1.12);z-index:2}
.cal .cell.nf{cursor:pointer;color:var(--ink2);box-shadow:var(--inset);
  background-image:repeating-linear-gradient(45deg,transparent 0 4px,color-mix(in srgb,var(--ink3) 22%,transparent) 4px 5px)}
.wt-Office{background:var(--s1);color:var(--wtOffice-fg)}
.wt-Discussion{background:var(--s3);color:var(--wtDisc-fg)}
.wt-WFH{background:var(--s5);color:var(--wtWFH-fg)}
.wt-Leave{color:var(--ink2);box-shadow:var(--inset-sm);
  background-image:repeating-linear-gradient(45deg,transparent 0 4px,color-mix(in srgb,var(--ink3) 20%,transparent) 4px 5px)}
.daylist .dayrow{display:grid;grid-template-columns:108px 92px 1fr auto;gap:13px;align-items:center;
  padding:12px 8px;border-bottom:1px solid var(--line);font-size:13px;cursor:pointer;border-radius:10px;
  transition:box-shadow .16s var(--ease)}
.daylist .dayrow:hover{box-shadow:var(--inset-sm)}
.dayrow .d-date{font-weight:640}
.dayrow .d-notes{color:var(--ink2);font-size:12.5px}
.dayrow .d-loc{color:var(--ink3);font-size:12px;display:inline-flex;align-items:center;gap:5px}
.dayrow .d-loc .ic{width:13px;height:13px}
.wt{font-size:10.5px;font-weight:700;padding:4px 10px;border-radius:9px;text-align:center;white-space:nowrap}

/* ----------------------------- modal -------------------------------- */
.modal{position:fixed;inset:0;background:color-mix(in srgb,var(--ink) 38%,transparent);display:none;
  place-items:center;z-index:120;padding:18px;backdrop-filter:blur(3px)}
.modal.open{display:grid;animation:fade .2s ease}
.dialog{width:min(660px,100%);max-height:88vh;overflow:auto;background:var(--bg);border-radius:22px;
  box-shadow:0 30px 60px -24px var(--sh),var(--raise);padding:24px;animation:pop .26s var(--ease)}
.dialog h3{margin:0 0 18px;font-size:16px;font-weight:680}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.form-grid label{display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--ink2)}
.form-grid input,.form-grid select,.form-grid textarea{width:100%}
.dialog-actions{display:flex;gap:9px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}
.dialog-actions .left{margin-right:auto}

footer{max-width:1340px;margin:8px auto 40px;padding:0 clamp(14px,2.4vw,30px);color:var(--ink3);font-size:11.5px}
code{background:var(--card);border-radius:7px;padding:2px 7px;font-size:11px;box-shadow:var(--inset-sm)}
.hidden{display:none!important}
.empty-note{color:var(--ink3);font-size:13px;padding:26px;text-align:center}

/* ----------------------------- motion ------------------------------- */
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:none}}
@keyframes reveal{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.reveal{animation:reveal .5s var(--ease) both}

/* ----------------------------- responsive --------------------------- */
@media (max-width:1024px){:root{--labelw:170px}}
@media (max-width:900px){.btn .bl{display:none}.btn{padding:9px 11px}.top-actions{gap:6px}}
@media (max-width:768px){:root{--labelw:128px}.titles .sub{display:none}}
@media (max-width:680px){.form-grid{grid-template-columns:1fr}.daylist .dayrow{grid-template-columns:1fr;gap:5px}
  .dayrow .d-date{order:-1}}
@media (max-width:480px){.appwrap{gap:10px}.avatar{height:38px;width:38px}.logo-plate img{height:28px}
  .stat .num{font-size:26px}.panel{padding:15px}.brand-x{display:none}}
@media (max-width:360px){.tab{padding:9px 12px}.btn.sm{padding:8px 9px}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}
  #orbs{display:none}.bar>i{transition:none}}

@media print{
  body{background:#fff;color:#000}
  #orbs,#progress,.no-print,.tabs,.toolbar,.top-actions,.row-actions,.modal{display:none!important}
  .appbar{position:static;backdrop-filter:none}
  .panel,.stat,.pcard,.month{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
  #view-projects,#view-engagement{display:block!important}
  .cards{grid-template-columns:repeat(2,1fr)}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>
<a href="#main" class="skip">Skip to content</a>
<div id="orbs" aria-hidden="true"></div>
<div id="progress" aria-hidden="true"><i></i></div>

<header class="appbar" id="appbar">
  <div class="appwrap">
    <div class="brand" id="brand">
      <span class="logo-plate"><img src="graylinxLogo.png" alt="Graylinx" onerror="this.parentNode.style.display='none'"/></span>
      <span class="brand-x" aria-hidden="true">×</span>
      <img class="avatar" src="IMG-20230616-WA0000.jpg" alt="Harshan Aiyappa" onerror="this.style.display='none'"/>
      <div class="titles"><h1>Harshan&nbsp;×&nbsp;Graylinx</h1><div class="sub" id="span-sub">Work tracker & showcase</div></div>
    </div>
    <div class="top-actions no-print">
      <button class="btn sm" id="btn-theme" title="Light / dark / auto"><span class="ic" data-icon="contrast"></span><span class="bl">Theme</span></button>
      <button class="btn sm" id="btn-add"><span class="ic" data-icon="plus"></span><span class="bl">Add</span></button>
      <button class="btn sm" id="btn-export"><span class="ic" data-icon="download"></span><span class="bl">Export</span></button>
      <button class="btn sm" id="btn-import"><span class="ic" data-icon="upload"></span><span class="bl">Import</span></button>
      <button class="btn sm" id="btn-print"><span class="ic" data-icon="printer"></span><span class="bl">Print</span></button>
      <button class="btn sm" id="btn-reset" title="Discard local edits"><span class="ic" data-icon="reset"></span><span class="bl">Reset</span></button>
      <input type="file" id="file-input" accept=".json,.csv" class="hidden" />
    </div>
  </div>
</header>

<main id="main">
  <section class="stats" id="stats" aria-label="Summary statistics"></section>

  <div class="tabs" role="tablist" aria-label="Views">
    <button class="tab" id="tab-projects" role="tab" aria-selected="true" aria-controls="view-projects"><span class="ic" data-icon="chart"></span> Projects &amp; Timeline</button>
    <button class="tab" id="tab-engagement" role="tab" aria-selected="false" aria-controls="view-engagement"><span class="ic" data-icon="calendar"></span> Engagement &amp; Deployment</button>
  </div>

  <section id="view-projects" role="tabpanel" aria-labelledby="tab-projects">
    <div class="toolbar no-print">
      <div class="field"><label for="f-cat">Category</label><select id="f-cat"><option value="">All categories</option></select></div>
      <div class="field"><label for="f-status">Status</label><select id="f-status"><option value="">All statuses</option></select></div>
      <div class="field"><label for="f-sort">Sort</label><select id="f-sort">
        <option value="start">Start date</option><option value="end">End date</option>
        <option value="commits">Commits</option><option value="name">Name</option><option value="progress">Progress</option></select></div>
      <div class="field" style="flex:1;min-width:200px"><label for="f-search">Search</label><input type="text" id="f-search" class="search" placeholder="name, tech, role…"/></div>

      html+=`<div class="grow"><div class="glabel" title="${esc(p.name)}">${esc(p.name)}</div>
        <div class="gtrack">${lines}<div class="gtoday" style="left:${todayLeft}%"></div>
          <div class="gbar" data-id="${esc(p.id)}" style="left:${l}%;width:${w}%;background:${col}" title="${esc(p.name)} · ${fmt(p.start)}→${fmt(p.end)} · ${esc(p.status)}"></div></div></div>`; });
    html+=`</div>`; });
  const g=document.getElementById("gantt"); g.innerHTML=html;
  g.querySelectorAll(".gbar").forEach(b=>b.addEventListener("click",()=>openProject(b.dataset.id)));
}

/* ===================== Cards ===================== */
function visibleProjects(){
  const cat=document.getElementById("f-cat").value,stt=document.getElementById("f-status").value;
  const q=document.getElementById("f-search").value.toLowerCase().trim(),sort=document.getElementById("f-sort").value;
  let ps=projects().filter(p=>p.type==="project");
  if(cat) ps=ps.filter(p=>p.category===cat); if(stt) ps=ps.filter(p=>p.status===stt);
  if(q) ps=ps.filter(p=>(p.name+" "+p.role+" "+p.description+" "+asList(p.tech).join(" ")+" "+p.category).toLowerCase().includes(q));
  ps.sort((a,b)=>{ if(sort==="name") return a.name.localeCompare(b.name);
    if(sort==="commits") return (+b.commits||0)-(+a.commits||0);
    if(sort==="progress") return (+b.progress||0)-(+a.progress||0);
    if(sort==="end") return effEnd(b).localeCompare(effEnd(a)); return (a.start||"").localeCompare(b.start||""); });
  return ps;
}
function renderCards(){
  const ps=visibleProjects(),wrap=document.getElementById("cards");
  if(!ps.length){ wrap.innerHTML=`<div class="empty-note">No projects match your filters.</div>`; return; }
  wrap.innerHTML=ps.map((p,i)=>{ const col=statusColor(p.status),ms=projects().filter(m=>m.parent_id===p.id),hl=asList(p.highlights);
    return `<article class="pcard ${animate&&!RM?"reveal":""}" style="--barcol:${col};animation-delay:${i*35}ms">
      <div class="phead"><div><h3>${esc(p.name)}</h3><div class="pcat">${esc(p.category)}</div></div>
        <span class="chip"><span class="dot" style="background:${col}"></span><span class="glyph">${statusGlyph(p.status)}</span>${esc(p.status)}</span></div>
      <div class="dates"><b>${fmt(p.start)}</b> → <b>${fmt(p.end)}</b><span class="src">${esc(p.date_source)}</span>
        ${(+p.commits>0)?`<span class="commits">${icon("commit",13)} ${p.commits}</span>`:""}</div>
      <div class="pdesc">${esc(p.description)}</div>
      ${p.role?`<div class="prole"><b>Role:</b> ${esc(p.role)}</div>`:""}
      <div class="tags">${asList(p.tech).map(t=>`<span class="tag">${esc(t)}</span>`).join("")}</div>
      ${hl.length?`<ul class="hl">${hl.map(h=>`<li>${esc(h)}</li>`).join("")}</ul>`:""}
      ${ms.length?`<div class="pcat">Milestones (${ms.length})</div><div class="tags">${ms.map(m=>`<span class="tag" title="${esc(m.status)} · ${m.progress}%">${esc(m.name)}</span>`).join("")}</div>`:""}
      <div class="bar" title="${p.progress||0}%"><i data-w="${Math.max(2,+p.progress||0)}"></i></div>
      <div class="row-actions no-print"><button class="btn sm" data-edit="${esc(p.id)}">${icon("edit",15)} Edit</button></div></article>`;
  }).join("");
  wrap.querySelectorAll("[data-edit]").forEach(b=>b.addEventListener("click",()=>openProject(b.dataset.edit)));
  requestAnimationFrame(()=>wrap.querySelectorAll(".bar > i").forEach(i=>i.style.width=i.dataset.w+"%"));
}
function renderStatusLegend(){
  document.getElementById("status-legend").innerHTML=
    STATUS_LIST.map(s=>`<span><span class="dot" style="background:${statusColor(s)}"></span>${statusGlyph(s)} ${esc(s)}</span>`).join("")
    +`<span style="margin-left:auto;color:var(--ink3)">bars by status · dashed = today</span>`;
}

/* ===================== Engagement ===================== */
function renderEngStats(){
  const e=engagement(),bt=t=>e.filter(r=>r.work_type===t).length;
  const locs=new Set(e.filter(r=>r.location).map(r=>r.location)).size,nf=e.filter(r=>r.source==="needs-fill").length;
  statCards(document.getElementById("eng-stats"),[
    ["Days logged",e.length-nf,nf+" need filling"],["On-site",bt("Office")+bt("Discussion"),"office + discussion"],
    ["WFH",bt("WFH"),"remote"],["Hotel nights",e.filter(r=>r.hotel).length,"stays"],["Locations",locs,"distinct places"],
  ]);
  document.getElementById("wt-legend").innerHTML=
    WT_LIST.map(t=>`<span><span class="swatch wt-${t}"></span>${esc(t)}</span>`).join("")
    +`<span><span class="swatch wt-Leave"></span>Needs filling</span>`;
}
function wtCls(r){ return r.source==="needs-fill"?"nf":("wt-"+(r.work_type||"Leave")); }
function renderCalendar(){
  const e=engagement(); if(!e.length){ document.getElementById("calendar").innerHTML=`<div class="empty-note">No engagement data.</div>`; return; }
  const byDate={}; e.forEach(r=>byDate[r.date]=r);
  const first=parse(e[0].date),last=parse(e[e.length-1].date),WDS=["Su","Mo","Tu","We","Th","Fr","Sa"];
  let html="",m=new Date(first.getFullYear(),first.getMonth(),1);
  while(m<=last){ const y=m.getFullYear(),mo=m.getMonth(),start=new Date(y,mo,1).getDay(),days=new Date(y,mo+1,0).getDate();
    let cells=WDS.map(w=>`<div class="wd">${w}</div>`).join("");
    for(let i=0;i<start;i++) cells+=`<div class="cell empty"></div>`;
    for(let d=1;d<=days;d++){ const ds=y+"-"+d2(mo+1)+"-"+d2(d),rec=byDate[ds];
      if(!rec){ cells+=`<div class="cell">${d}</div>`; continue; }
      if(rec.source==="needs-fill"){ cells+=`<div class="cell nf" data-date="${ds}" title="${ds} — needs filling">${d}</div>`; continue; }
      cells+=`<div class="cell has ${wtCls(rec)}" data-date="${ds}" title="${esc(ds)} · ${esc(rec.work_type)} · ${esc(rec.location||"")}">${d}</div>`; }
    html+=`<div class="month"><h4>${m.toLocaleDateString(undefined,{month:"long",year:"numeric"})}</h4><div class="cal">${cells}</div></div>`;
    m=new Date(y,mo+1,1); }
  const cal=document.getElementById("calendar"); cal.innerHTML=html;
  cal.querySelectorAll("[data-date]").forEach(c=>c.addEventListener("click",()=>openDay(c.dataset.date)));
}
function renderDayList(){
  const q=document.getElementById("e-search").value.toLowerCase().trim(),f=document.getElementById("e-filter").value;
  let e=engagement().slice().reverse();
  if(f==="needs-fill") e=e.filter(r=>r.source==="needs-fill"); else if(f) e=e.filter(r=>r.work_type===f);
  if(q) e=e.filter(r=>(r.location+" "+r.notes+" "+r.work_type+" "+r.hotel).toLowerCase().includes(q));
  const wrap=document.getElementById("daylist");
  if(!e.length){ wrap.innerHTML=`<div class="empty-note">No matching days.</div>`; return; }
  wrap.innerHTML=e.map(r=>{ const nf=r.source==="needs-fill";
    return `<div class="dayrow" data-date="${esc(r.date)}">
      <span class="d-date">${fmt(r.date)}<br><small style="color:var(--ink3)">${esc(r.day||"")}</small></span>
      <span class="wt ${nf?"wt-Leave":"wt-"+(r.work_type||"Leave")}">${esc(nf?"fill":(r.work_type||"—"))}</span>
      <span><span class="d-loc">${r.location?icon("pin",13):""}${esc(r.location||(nf?"(add details)":"—"))}</span><br><span class="d-notes">${esc(r.notes||"")}</span></span>
      <span class="d-loc">${r.hotel?(icon("bed",13)+" "+esc(r.hotel)):""}${r.travel?(" "+icon("route",13)+" "+esc(r.travel)):""}</span></div>`;
  }).join("");
  wrap.querySelectorAll(".dayrow").forEach(d=>d.addEventListener("click",()=>openDay(d.dataset.date)));
}

/* ===================== Modal ===================== */
const modal=document.getElementById("modal"); let modalCtx=null;
function field(label,name,val,type="text",opts){
  if(type==="select") return `<label class="${opts&&opts.full?"full":""}">${label}<select name="${name}">${opts.choices.map(c=>`<option ${c===val?"selected":""}>${esc(c)}</option>`).join("")}</select></label>`;
  if(type==="textarea") return `<label class="full">${label}<textarea name="${name}">${esc(val)}</textarea></label>`;
  return `<label class="${opts&&opts.full?"full":""}">${label}<input type="${type}" name="${name}" value="${esc(val)}"/></label>`;
}
function openProject(id){ const p=projects().find(x=>x.id===id); if(!p) return; modalCtx={kind:"project",id};
  document.getElementById("modal-title").textContent="Edit project — "+p.name;
  document.getElementById("modal-delete").classList.remove("hidden");
  document.getElementById("modal-body").innerHTML=`<div class="form-grid">
    ${field("Name","name",p.name,"text",{full:true})}${field("Category","category",p.category)}
    ${field("Status","status",p.status,"select",{choices:STATUS_LIST})}${field("Start","start",p.start,"date")}
    ${field("End (blank = ongoing)","end",p.end==="ongoing"?"":p.end,"text")}${field("Progress %","progress",p.progress,"number")}
    ${field("Commits","commits",p.commits,"number")}${field("Date source","date_source",p.date_source,"select",{choices:["git","approx","manual"]})}
    ${field("Description","description",p.description,"textarea")}${field("Role","role",p.role,"textarea")}
    ${field("Tech (; separated)","tech",asList(p.tech).join("; "),"textarea")}${field("Highlights (; separated)","highlights",asList(p.highlights).join("; "),"textarea")}</div>`;
  openModal();
}
function openDay(dateStr){ let r=engagement().find(x=>x.date===dateStr);
  if(!r) r={date:dateStr,day:parse(dateStr).toLocaleDateString(undefined,{weekday:"long"}),work_type:"WFH",location:"",hotel:"",check_in:"",check_out:"",travel:"",notes:"",linked_project:"",source:"manual"};
  modalCtx={kind:"day",date:dateStr};
  document.getElementById("modal-title").textContent="Engagement — "+fmt(dateStr)+" ("+(r.day||"")+")";
  document.getElementById("modal-delete").classList.remove("hidden");
  const pc=[""].concat(projects().filter(p=>p.type==="project").map(p=>p.id));
  document.getElementById("modal-body").innerHTML=`<div class="form-grid">
    ${field("Work type","work_type",r.work_type,"select",{choices:["Office","Discussion","WFH","Leave",""]})}${field("Location","location",r.location)}
    ${field("Hotel","hotel",r.hotel)}${field("Travel","travel",r.travel,"text",{full:true})}
    ${field("Check-in","check_in",r.check_in)}${field("Check-out","check_out",r.check_out)}
    ${field("Linked project","linked_project",r.linked_project,"select",{choices:pc})}${field("Source","source",r.source,"select",{choices:["csv","derived","manual","needs-fill"]})}
    ${field("Notes","notes",r.notes,"textarea")}</div>`;
  openModal();
}
function openModal(){ modal.classList.add("open"); if(lenis) lenis.stop(); const f=modal.querySelector("#modal-body input,#modal-body select,#modal-body textarea"); if(f) f.focus(); }
function closeModal(){ modal.classList.remove("open"); if(lenis) lenis.start(); modalCtx=null; }
function readForm(){ const o={}; modal.querySelectorAll("[name]").forEach(el=>o[el.name]=el.value); return o; }
document.getElementById("modal-cancel").addEventListener("click",closeModal);
modal.addEventListener("click",e=>{ if(e.target===modal) closeModal(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&modal.classList.contains("open")) closeModal(); });
document.getElementById("modal-save").addEventListener("click",()=>{ const f=readForm(); animate=false;
  if(modalCtx.kind==="project"){ const p=projects().find(x=>x.id===modalCtx.id);
    Object.assign(p,{name:f.name,category:f.category,status:f.status,start:f.start,end:f.end.trim()||"ongoing",progress:+f.progress||0,commits:+f.commits||0,date_source:f.date_source,description:f.description,role:f.role,tech:asList(f.tech),highlights:asList(f.highlights)});
  } else { let r=engagement().find(x=>x.date===modalCtx.date);
    if(!r){ r={date:modalCtx.date}; DB.engagement.push(r); DB.engagement.sort((a,b)=>a.date.localeCompare(b.date)); }
    Object.assign(r,{day:r.day||parse(modalCtx.date).toLocaleDateString(undefined,{weekday:"long"}),work_type:f.work_type,location:f.location,hotel:f.hotel,travel:f.travel,check_in:f.check_in,check_out:f.check_out,linked_project:f.linked_project,notes:f.notes,source:f.source}); }
  persist(); closeModal(); renderAll();
});
document.getElementById("modal-delete").addEventListener("click",()=>{ if(!confirm("Delete this entry?")) return; animate=false;
  if(modalCtx.kind==="project") DB.projects=projects().filter(p=>p.id!==modalCtx.id&&p.parent_id!==modalCtx.id);
  else DB.engagement=engagement().filter(r=>r.date!==modalCtx.date);
  persist(); closeModal(); renderAll();
});
document.getElementById("btn-add").addEventListener("click",()=>{
  if(!document.getElementById("view-projects").hidden){ const id="proj-"+Date.now(); animate=false;
    DB.projects.push({id,parent_id:"",type:"project",name:"New project",category:"Graylinx Core",description:"",role:"",tech:[],start:TODAY,end:"ongoing",date_source:"manual",status:"Active",progress:0,commits:0,location:"",highlights:[],links:"",notes:""});
    persist(); renderAll(); openProject(id);
  } else openDay(TODAY);
});

/* ===================== Export / Import / Theme / Print ===================== */
function download(name,text,type){ const b=new Blob([text],{type}),u=URL.createObjectURL(b),a=document.createElement("a"); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }
function toCSV(cols,rows){ const q=v=>{ v=Array.isArray(v)?v.join("; "):(v==null?"":String(v)); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }; return cols.join(",")+"\n"+rows.map(r=>cols.map(c=>q(r[c])).join(",")).join("\n"); }
const PCOLS=["id","parent_id","type","name","category","description","role","tech","start","end","date_source","status","progress","commits","location","highlights","links","notes"];
const ECOLS=["date","day","work_type","location","hotel","check_in","check_out","travel","notes","linked_project","source"];
document.getElementById("btn-export").addEventListener("click",()=>{ const w=prompt("Export:  'csv' (projects), 'eng' (engagement), or 'json'","csv"); if(!w) return;
  if(w==="json") download("works.json",JSON.stringify(DB,null,2),"application/json");
  else if(w==="eng") download("engagement.csv",toCSV(ECOLS,engagement()),"text/csv");
  else download("works.csv",toCSV(PCOLS,projects()),"text/csv"); });
document.getElementById("btn-import").addEventListener("click",()=>document.getElementById("file-input").click());
document.getElementById("file-input").addEventListener("change",e=>{ const file=e.target.files[0]; if(!file) return; const rd=new FileReader();
  rd.onload=()=>{ try{ animate=false;
    if(file.name.endsWith(".json")){ const d=JSON.parse(rd.result); if(d.projects||d.engagement) DB=d; else { alert("JSON must contain projects/engagement."); return; } }
    else importCSV(rd.result); persist(); renderAll(); alert("Imported "+file.name);
  }catch(err){ alert("Import failed: "+err.message); } };
  rd.readAsText(file); e.target.value=""; });
function importCSV(text){ const rows=parseCSV(text); if(!rows.length) return;
  const head=rows[0].map(h=>h.trim()),objs=rows.slice(1).map(r=>{ const o={}; head.forEach((h,i)=>o[h]=r[i]); return o; });
  if(head.includes("date")&&head.includes("work_type")) DB.engagement=objs;
  else { objs.forEach(o=>{ o.tech=asList(o.tech); o.highlights=asList(o.highlights); o.progress=+o.progress||0; o.commits=+o.commits||0; }); DB.projects=objs; } }
function parseCSV(text){ const rows=[]; let row=[],cur="",q=false;
  for(let i=0;i<text.length;i++){ const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; } else cur+=c; }
    else { if(c==='"') q=true; else if(c===","){ row.push(cur); cur=""; } else if(c==="\n"){ row.push(cur); rows.push(row); row=[]; cur=""; } else if(c!=="\r") cur+=c; } }
  if(cur||row.length){ row.push(cur); rows.push(row); } return rows.filter(r=>r.some(c=>c.trim())); }
document.getElementById("btn-print").addEventListener("click",()=>window.print());
document.getElementById("btn-reset").addEventListener("click",()=>{ if(confirm("Discard local edits and reload the seed data?")){ localStorage.removeItem(STORE_KEY); DB=clone(SEED); animate=true; renderAll(); } });
document.getElementById("btn-theme").addEventListener("click",()=>{ const cur=document.documentElement.getAttribute("data-theme"),next=cur==="dark"?"light":(cur==="light"?"auto":"dark");
  document.documentElement.setAttribute("data-theme",next); try{localStorage.setItem("glx-theme",next);}catch(e){} animate=false; renderAll(); });
(function(){ try{const t=localStorage.getItem("glx-theme"); if(t) document.documentElement.setAttribute("data-theme",t);}catch(e){} })();

/* ===================== Lenis smooth scroll + progress + parallax ===================== */
let lenis=null;
const progressBar=document.querySelector("#progress > i"), appbar=document.getElementById("appbar"), brand=document.getElementById("brand"), orbs=document.getElementById("orbs");
function onScroll(st){ const h=document.documentElement.scrollHeight-innerHeight; const k=h>0?Math.min(1,st/h):0;
  progressBar.style.transform="scaleX("+k+")"; appbar.classList.toggle("scrolled", st>8);
  if(!RM){ if(orbs) orbs.style.transform="translateY("+(st*0.18)+"px)"; if(brand) brand.style.transform="translateY("+Math.min(st*0.04,6)+"px)"; } }
if(!RM && window.Lenis){
  lenis=new Lenis({duration:1.05,smoothWheel:true,wheelMultiplier:1});
  lenis.on("scroll",e=>onScroll(e.scroll||e.animatedScroll||scrollY));
  (function raf(t){ lenis.raf(t); requestAnimationFrame(raf); })(0);
} else { addEventListener("scroll",()=>onScroll(scrollY),{passive:true}); }

/* ===================== Tabs / filters / boot ===================== */
function selectTab(which){ const pj=which==="projects";
  document.getElementById("tab-projects").setAttribute("aria-selected",pj);
  document.getElementById("tab-engagement").setAttribute("aria-selected",!pj);
  document.getElementById("view-projects").hidden=!pj; document.getElementById("view-engagement").hidden=pj; animate=true; renderAll(); }
document.getElementById("tab-projects").addEventListener("click",()=>selectTab("projects"));
document.getElementById("tab-engagement").addEventListener("click",()=>selectTab("engagement"));
function initFilters(){
  const cats=[...new Set(projects().filter(p=>p.type==="project").map(p=>p.category))].sort();
  document.getElementById("f-cat").innerHTML=`<option value="">All categories</option>`+cats.map(c=>`<option>${esc(c)}</option>`).join("");
  document.getElementById("f-status").innerHTML=`<option value="">All statuses</option>`+STATUS_LIST.map(s=>`<option>${esc(s)}</option>`).join("");
  ["f-cat","f-status","f-sort","f-search"].forEach(id=>document.getElementById(id).addEventListener(id==="f-search"?"input":"change",()=>{animate=false;renderGantt();renderCards();}));
  ["e-search","e-filter"].forEach(id=>document.getElementById(id).addEventListener(id==="e-search"?"input":"change",()=>renderDayList()));
}
function renderAll(){ renderStats(); renderStatusLegend(); renderGantt(); renderCards(); renderEngStats(); renderCalendar(); renderDayList(); }
paintIcons(); initFilters(); renderAll();
</script>
